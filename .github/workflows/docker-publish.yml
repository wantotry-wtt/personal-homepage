name: 自动构建 Docker 镜像

on:
  push:
    branches: [ "main" ] # 当 main 分支有代码更新时触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 允许向 GitHub 的镜像库写入镜像

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 登录到 GitHub 容器镜像库 (GHCR)
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: 构建并推送镜像
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        # 注意这里：这是你的专属镜像地址
        tags: ghcr.io/wantotry-wtt/personal-homepage:latest